version: '3.8'

services:
  postgis:
    image: postgis/postgis:15-3.3
    container_name: gis_postgis
    # /dev/shm must be large enough for PostgreSQL parallel query workers.
    # Default Docker shm is 64 MB → "No space left on device" errors on large
    # spatial tables (lbs_50k_nasional_subdiv ~3.4M rows, lsd ~1.45M rows).
    shm_size: '256m'
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/create_users.sql:/docker-entrypoint-initdb.d/02-create-users.sql
      - ./data:/data:ro
    networks:
      - gis-network
    # Limit parallel workers to keep shared-memory footprint predictable.
    command: >
      postgres
        -c max_parallel_workers_per_gather=2
        -c max_parallel_workers=4
        -c work_mem=32MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gis_fastapi
    depends_on:
      postgis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - ENVIRONMENT=${ENVIRONMENT}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-satellite-data}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
    volumes:
      - ./backend:/app
      - ./data:/data:ro
    networks:
      - gis-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: gis_minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - gis-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  tegola:
    image: gospatial/tegola:v0.18.0
    container_name: gis_tegola
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgis
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./tegola/config.toml:/config/config.toml:ro
      - tegola-cache:/tmp/tegola-cache
    networks:
      - gis-network
    command: serve --config /config/config.toml
    restart: unless-stopped

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    container_name: gis_titiler
    environment:
      - TITILER_API_CORS_ORIGINS=["*"]
      - TITILER_API_CORS_ALLOW_METHODS=["GET","HEAD","OPTIONS"]
      - GDAL_DISABLE_READDIR_ON_OPEN=EMPTY_DIR
      - GDAL_HTTP_MERGE_CONSECUTIVE_RANGES=YES
      - GDAL_HTTP_MAX_RETRY=3
      - GDAL_HTTP_RETRY_DELAY=1
      - GDAL_HTTP_UNSAFESSL=YES
      # Allow vsicurl access to any .tif, .tiff, or presigned-URL paths
      - CPL_VSIL_CURL_ALLOWED_EXTENSIONS=.tif,.TIF,.tiff,.jp2,.JP2
      - CPL_VSIL_CURL_NON_CACHED=/vsicurl/
      - VSI_CACHE=TRUE
      - GDAL_CACHEMAX=200
    networks:
      - gis-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: gis_nginx
    depends_on:
      - fastapi
      - tegola
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    # Port bindings are defined in environment-specific overrides:
    #   dev:  docker-compose.dev.yml  → 0.0.0.0:80 and 0.0.0.0:443
    #   prod: docker-compose.prod.yml → 127.0.0.1:8180:80
    networks:
      - gis-network
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  tegola-cache:
    driver: local
  minio-data:
    driver: local

networks:
  gis-network:
    driver: bridge
