    max_zoom = 16

    [[maps.layers]]
    provider_layer = "postgis.points"
    min_zoom = 0
    max_zoom = 16

    [[maps.layers]]
    provider_layer = "postgis.ai_boundaries"
    name = "ai_boundaries"
    min_zoom = 7
    max_zoom = 16

    [[maps.layers]]
    provider_layer = "postgis.crop_health"
    name = "crop_health"
    min_zoom = 7
    max_zoom = 16

    [[maps.layers]]
    provider_layer = "postgis.disaster_risk"
    name = "disaster_risk"
