# Tegola Vector Tile Server Configuration
# Serves vector tiles from PostGIS database

[webserver]
port = ":8080"

# Cache configuration
[cache]
type = "file"
basepath = "/tmp/tegola-cache"
max_zoom = 16

# PostGIS data provider
[[providers]]
name = "postgis"
type = "postgis"
host = "${POSTGRES_HOST}"
port = ${POSTGRES_PORT}
database = "${POSTGRES_DB}"
user = "${POSTGRES_USER}"
password = "${POSTGRES_PASSWORD}"
srid = 4326
max_connections = 50

    # Layer for points
    [[providers.layers]]
    name = "points"
    geometry_fieldname = "geom"
    id_fieldname = "id"
    sql = """
        SELECT 
            id,
            name,
            category,
            geom_type,
            ST_AsMVTGeom(
                geom,
                !BBOX!,
                4096,
                256,
                true
            ) AS geom
        FROM spatial_features
        WHERE geom_type IN ('ST_Point', 'ST_MultiPoint')
            AND geom && !BBOX!
            AND ST_IsValid(geom)
    """

    # Layer for lines with zoom-based simplification
    [[providers.layers]]
    name = "lines"
    geometry_fieldname = "geom"
    id_fieldname = "id"
    sql = """
        SELECT 
            id,
            name,
            category,
            geom_type,
            ST_AsMVTGeom(
                CASE 
                    WHEN !ZOOM! < 10 THEN ST_Simplify(geom, 0.001)
                    WHEN !ZOOM! < 14 THEN ST_Simplify(geom, 0.0001)
                    ELSE geom
                END,
                !BBOX!,
                4096,
                256,
                true
            ) AS geom
        FROM spatial_features
        WHERE geom_type IN ('ST_LineString', 'ST_MultiLineString')
            AND geom && !BBOX!
            AND ST_IsValid(geom)
    """

    # Layer for polygons with aggressive simplification at low zooms
    [[providers.layers]]
    name = "polygons"
    geometry_fieldname = "geom"
    id_fieldname = "id"
    sql = """
        SELECT 
            id,
            name,
            category,
            geom_type,
            ST_AsMVTGeom(
                CASE 
                    WHEN !ZOOM! < 8 THEN ST_Simplify(geom, 0.01)
                    WHEN !ZOOM! < 12 THEN ST_Simplify(geom, 0.001)
                    WHEN !ZOOM! < 14 THEN ST_Simplify(geom, 0.0001)
                    ELSE geom
                END,
                !BBOX!,
                4096,
                256,
                true
            ) AS geom
        FROM spatial_features
        WHERE geom_type IN ('ST_Polygon', 'ST_MultiPolygon')
            AND geom && !BBOX!
            AND ST_IsValid(geom)
    """

    # Combined layer with all geometries (optional - use if you want a single layer)
    [[providers.layers]]
    name = "all_features"
    geometry_fieldname = "geom"
    id_fieldname = "id"
    sql = """
        SELECT 
            id,
            name,
            category,
            geom_type,
            ST_AsMVTGeom(
                CASE 
                    WHEN geom_type IN ('ST_Polygon', 'ST_MultiPolygon') THEN
                        CASE 
                            WHEN !ZOOM! < 8 THEN ST_Simplify(geom, 0.01)
                            WHEN !ZOOM! < 12 THEN ST_Simplify(geom, 0.001)
                            ELSE geom
                        END
                    WHEN geom_type IN ('ST_LineString', 'ST_MultiLineString') THEN
                        CASE 
                            WHEN !ZOOM! < 10 THEN ST_Simplify(geom, 0.001)
                            ELSE geom
                        END
                    ELSE geom
                END,
                !BBOX!,
                4096,
                256,
                true
            ) AS geom
        FROM spatial_features
        WHERE geom && !BBOX!
            AND ST_IsValid(geom)
    """

# Map configuration
[[maps]]
name = "gis_map"
attribution = "© GIS Web Application"
center = [0.0, 0.0, 2]
bounds = [-180.0, -85.0511, 180.0, 85.0511]

    # Add layers in rendering order (bottom to top)
    [[maps.layers]]
    provider_layer = "postgis.polygons"
    min_zoom = 0
    max_zoom = 16

    [[maps.layers]]
    provider_layer = "postgis.lines"
    min_zoom = 0
    max_zoom = 16

    [[maps.layers]]
    provider_layer = "postgis.points"
    min_zoom = 0
    max_zoom = 16
