# Tegola Vector Tile Server Configuration
# Serves vector tiles from PostGIS database

[webserver]
port = ":8080"

# PostGIS data provider
[[providers]]
name = "postgis"
type = "postgis"
uri = "postgres://gisuser:gispassword123@postgis:5432/gisdb"
srid = 4326
max_connections = 50

    # ── Points ────────────────────────────────────────────────────────────────
    [[providers.layers]]
    name = "points"
    geometry_fieldname = "geom"
    id_fieldname = "id"
    geometry_type = "MultiPoint"
    sql = """
        SELECT
            id, name, category, geom_type,
            ST_AsBinary(geom) AS geom
        FROM spatial_features
        WHERE geom_type IN ('ST_Point', 'ST_MultiPoint')
          AND geom && !BBOX!
          AND ST_IsValid(geom)
    """

    # ── Lines ─────────────────────────────────────────────────────────────────
    [[providers.layers]]
    name = "lines"
    geometry_fieldname = "geom"
    id_fieldname = "id"
    geometry_type = "MultiLineString"
    sql = """
        SELECT
            id, name, category, geom_type,
            ST_AsBinary(
                CASE
                    WHEN !ZOOM! < 10 THEN ST_Simplify(geom, 0.001)
                    WHEN !ZOOM! < 14 THEN ST_Simplify(geom, 0.0001)
                    ELSE geom
                END
            ) AS geom
        FROM spatial_features
        WHERE geom_type IN ('ST_LineString', 'ST_MultiLineString')
          AND geom && !BBOX!
          AND ST_IsValid(geom)
    """

    # ── Polygons (general spatial_features) ───────────────────────────────────
    [[providers.layers]]
    name = "polygons"
    geometry_fieldname = "geom"
    id_fieldname = "id"
    geometry_type = "MultiPolygon"
    sql = """
        SELECT
            id, name, category, geom_type,
            ST_AsBinary(
                CASE
                    WHEN !ZOOM! < 8  THEN ST_Simplify(geom, 0.01)
                    WHEN !ZOOM! < 12 THEN ST_Simplify(geom, 0.001)
                    WHEN !ZOOM! < 14 THEN ST_Simplify(geom, 0.0001)
                    ELSE geom
                END
            ) AS geom
        FROM spatial_features
        WHERE geom_type IN ('ST_Polygon', 'ST_MultiPolygon')
          AND geom && !BBOX!
          AND ST_IsValid(geom)
    """

    # ── AI Analysis boundaries (farm_boundary + crop_classification) ──────────
    [[providers.layers]]
    name = "ai_boundaries"
    geometry_fieldname = "geom"
    id_fieldname = "id"
    geometry_type = "MultiPolygon"
    sql = """
        SELECT
            id, name, category, geom_type,
            properties->>'category' AS feature_category,
            properties->>'crop_type' AS crop_type,
            ST_AsBinary(geom) AS geom
        FROM spatial_features
        WHERE geom_type IN ('ST_Polygon', 'ST_MultiPolygon')
          AND category IN ('farm_boundary', 'crop_classification', 'ai_boundary')
          AND geom && !BBOX!
          AND ST_IsValid(geom)
    """

    # ── Crop Health zones (ndvi_zone + fertilizer_zone) ───────────────────────
    [[providers.layers]]
    name = "crop_health"
    geometry_fieldname = "geom"
    id_fieldname = "id"
    geometry_type = "MultiPolygon"
    sql = """
        SELECT
            id, name, category, geom_type,
            properties->>'category'   AS feature_category,
            properties->>'ndvi_class' AS ndvi_class,
            properties->>'zone_level' AS zone_level,
            (properties->>'ndvi_mean')::float AS ndvi_mean,
            ST_AsBinary(geom) AS geom
        FROM spatial_features
        WHERE geom_type IN ('ST_Polygon', 'ST_MultiPolygon')
          AND category IN ('ndvi_zone', 'fertilizer_zone', 'crop_health')
          AND geom && !BBOX!
          AND ST_IsValid(geom)
    """

    # ── Disaster Risk zones (flood_risk + drought_zone) ───────────────────────
    [[providers.layers]]
    name = "disaster_risk"
    geometry_fieldname = "geom"
    id_fieldname = "id"
    geometry_type = "MultiPolygon"
    sql = """
        SELECT
            id, name, category, geom_type,
            properties->>'category'    AS feature_category,
            properties->>'risk_level'  AS risk_level,
            (properties->>'drought_index')::float AS drought_index,
            ST_AsBinary(geom) AS geom
        FROM spatial_features
        WHERE geom_type IN ('ST_Polygon', 'ST_MultiPolygon')
          AND category IN ('flood_risk', 'drought_zone', 'disaster_risk')
          AND geom && !BBOX!
          AND ST_IsValid(geom)
    """

    # ── Yield Prediction zones ─────────────────────────────────────────────────
    [[providers.layers]]
    name = "yield_zones"
    geometry_fieldname = "geom"
    id_fieldname = "id"
    geometry_type = "MultiPolygon"
    sql = """
        SELECT
            id, name, category, geom_type,
            (properties->>'predicted_yield')::float AS predicted_yield,
            ST_AsBinary(geom) AS geom
        FROM spatial_features
        WHERE geom_type IN ('ST_Polygon', 'ST_MultiPolygon')
          AND category IN ('yield_zone', 'yield_prediction')
          AND geom && !BBOX!
          AND ST_IsValid(geom)
    """

    # ── Lahan Baku Sawah Nasional (LBS) ───────────────────────────────────────
    #
    # At low zoom, filter out small cells using their bounding-box area
    # (Box2D is free since PostGIS caches it). Simplify vertex-heavy cells to
    # keep tile sizes manageable. At zoom ≥ 13, all cells pass with full detail.
    [[providers.layers]]
    name = "lbs_50k_nasional"
    geometry_fieldname = "geom"
    id_fieldname = "id"
    geometry_type = "Polygon"
    sql = """
        SELECT id, src_id, wadmpr, wadmkk, q_name19, luas_polyg,
            ST_AsBinary(
                CASE
                    WHEN !ZOOM! <= 8  THEN ST_Simplify(geom, 0.005)
                    WHEN !ZOOM! <= 10 THEN ST_Simplify(geom, 0.001)
                    WHEN !ZOOM! <= 12 THEN ST_Simplify(geom, 0.0003)
                    ELSE geom
                END
            ) AS geom
        FROM public.lbs_50k_nasional_subdiv
        WHERE geom && !BBOX!
          AND (
              (!ZOOM! >= 13)
              OR (!ZOOM! >= 11 AND bbox_area > 0.000002)
              OR (!ZOOM! = 10  AND bbox_area > 0.00001)
              OR (!ZOOM! = 9   AND bbox_area > 0.00003)
              OR (!ZOOM! >= 7  AND bbox_area > 0.0001)
          )
    """

    # ── Lahan Sawah Dilindungi (LSD) ──────────────────────────────────────────
    # Source: lsd_50k_dilindungi_subdiv (1.45M pre-subdivided cells)
    [[providers.layers]]
    name = "lsd_50k_dilindungi"
    geometry_fieldname = "geom"
    id_fieldname = "id"
    geometry_type = "Polygon"
    sql = """
        SELECT id, luasha,
            ST_AsBinary(
                CASE
                    WHEN !ZOOM! <= 8  THEN ST_Simplify(geom, 0.005)
                    WHEN !ZOOM! <= 10 THEN ST_Simplify(geom, 0.001)
                    WHEN !ZOOM! <= 12 THEN ST_Simplify(geom, 0.0003)
                    ELSE geom
                END
            ) AS geom
        FROM public.lsd_50k_dilindungi_subdiv
        WHERE geom && !BBOX!
          AND (
              (!ZOOM! >= 13)
              OR (!ZOOM! >= 11 AND bbox_area > 0.000002)
              OR (!ZOOM! = 10  AND bbox_area > 0.00001)
              OR (!ZOOM! = 9   AND bbox_area > 0.00003)
              OR (!ZOOM! >= 7  AND bbox_area > 0.0001)
          )
    """

# ── Map: gis_map ──────────────────────────────────────────────────────────────
